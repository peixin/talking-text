# Business configuration — committed to git, no secrets.
# Secrets and infrastructure URLs belong in .env

[adapter]
# Voice pipeline providers (separate wire protocols).
#   stt: "volc" (WebSocket) | "dashscope" (Qwen-ASR, zh+en code-switching)
#   tts: "volc" (Tina child voice) | "openai_compatible" (/audio/speech: OpenAI / self-hosted)
# Note: Aliyun Qwen-TTS (DashScope-native WS) and Xiaomi audio are not yet wired.
stt_provider = "volc"
tts_provider = "volc"

[adapter.ingest]
# How material extraction runs (A/B this on real textbook pages):
#   "single"    — one multimodal call (stage.extraction) does OCR + structuring.
#   "two_stage" — stage.perception (VLM layout-aware transcription) feeds
#                 stage.structuring (a strong text model, the single "brain").
#                 Text-only input skips perception and goes straight to structuring.
extraction_mode = "single"

# ── LLM stages ────────────────────────────────────────────────────────────────
# Each AI interaction stage picks its own provider + model, so we can run a cheap
# model for high-volume chat and a stronger one for material extraction.
# Supported LLM providers (all OpenAI-compatible): deepseek | volc_ark | aliyun | xiaomi
# Per-provider base_url + API key live in .env (see app/config.py).
# Context window / capabilities / pricing per model live in models.toml, keyed by
# "<provider>/<model>" — switching model auto-updates the context limit.

[adapter.stage.chat]
# Dialog turns + utility text tasks (session titles, mastery, calibration).
# High volume, simple English Q&A → cheapest fast model wins. DeepSeek's cache-hit
# price (~¥0.02/M) is ideal here: the curriculum+persona system prompt repeats every
# turn, so multi-turn chat is mostly cache hits.
provider = "deepseek"
model = "deepseek-v4-flash"
thinking = "disabled"       # deepseek only: "disabled" | "enabled"
reasoning_effort = "low"    # deepseek only, when thinking = "enabled"

[adapter.stage.extraction]
# Used when ingest.extraction_mode = "single": one multimodal call does both
# OCR and structuring. The model must list "image" in models.toml
# input_modalities (validated at startup). Examples:
#   volc_ark : "doubao-seed-2-0-mini-260428" (multimodal seed; optionally map it
#              to an Ark endpoint id in .env VOLC_ARK_ENDPOINTS for the discount)
#   aliyun   : "qwen3-vl-plus" (strong VL + reasoning)
#   xiaomi   : "mimo-v2.5" (multimodal; the -pro variant is text-only)
provider = "volc_ark"
model = "doubao-seed-2-0-mini-260428"

[adapter.stage.perception]
# Used when extraction_mode = "two_stage" (images only): a VLM that transcribes
# the page into layout-aware Markdown (preserving image-word pairings, tables,
# groupings). Just a good transcriber — the reasoning lives in structuring.
# The model must list "image" in models.toml input_modalities (validated at startup).
provider = "volc_ark"
model = "doubao-seed-2-0-mini-260428"     # volc_ark: optional endpoint id via VOLC_ARK_ENDPOINTS (.env)

[adapter.stage.structuring]
# Used when extraction_mode = "two_stage": the single "brain" that turns all
# text artifacts (transcription + pasted text) into language items. Can be a
# text-only reasoner since it never sees images.
provider = "deepseek"
model = "deepseek-v4-pro"
thinking = "enabled"        # complex structuring benefits from reasoning
reasoning_effort = "medium"

# ── Per-task generation budgets ───────────────────────────────────────────────
# How long an output we request per use. A task decision (not a model property);
# the model's hard ceiling lives in models.toml.
[task.dialog]
max_tokens = 200            # child chat reply (kept short for low latency)
temperature = 0.7
[task.greeting]
max_tokens = 100            # AI-initiated session opener
temperature = 0.7
[task.title]
max_tokens = 20             # ≤8-char session title
temperature = 0.3
[task.calibration]
max_tokens = 200            # learner level estimation
temperature = 0.0
[task.mastery]
max_tokens = 600            # session-end mastery analysis
temperature = 0.0
[task.persona]
max_tokens = 600            # learner AI-persona generation
temperature = 0.2
[task.group_naming]
max_tokens = 300            # auto-name an item group
temperature = 0.7
[task.extraction]
# Curriculum item extraction / structuring. Budget must fit the FULL transcription
# + items JSON of a dense textbook page — a truncated response is unparseable
# (the adapter warns on finish_reason="length").
max_tokens = 4096
temperature = 0.2
[task.perception]
max_tokens = 4096           # two-stage VLM transcription (full-page, layout-aware)
temperature = 0.1

[scope]
# Scope V2 "stretch" — next-unit words the LLM may quietly weave in (i+1).
# Budget per session = ceil(stretch_ratio * base word count), capped at stretch_max_words.
# stretch_ratio = 0 disables stretch entirely.
stretch_ratio = 0.10
stretch_max_words = 8

[session]
# UX soft limit: show "start a new topic?" prompt when turn count reaches this value.
max_turns = 10
# Internal hard limit: refuse a new turn when the most-recent turn's llm_input_tokens
# exceeds this fraction of the active model's context_window.
# Protects against runaway context consumption as system prompt grows (curriculum data,
# personal vocab ledger). Users almost never hit this; it is a safety net, not a UX gate.
context_hard_limit = 0.85

[auth]
# Session cookie lifetime in days
session_max_age_days = 365
# Maximum failed login attempts before lockout (future use)
max_login_attempts = 5

[debug]
# Emit [perf] timing logs for each pipeline stage (STT / LLM / TTS / DB).
# Safe to enable in production — logs go to stdout at INFO level, no PII.
perf_logging = true
