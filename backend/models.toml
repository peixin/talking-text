# Model registry — per-model metadata that drives context limits, capability
# gating, and (later) cost calculation. Committed business config; no secrets.
#
# Structure: [model.<provider>."<model_id>"] — the CHANNEL (provider) is a table
# level, not a name prefix, so model ids stay clean. <provider> matches
# config.toml [adapter.stage.*].provider (and stt_provider/tts_provider); the
# code looks up by the (provider, model) pair. The SAME model under two channels
# costs differently → it lives once per channel section, no prefix gymnastics.
#
# kind: "llm" | "stt" | "tts"
# features: any of "cache" "thinking" "structured_output" "function_calling"
# pricing.unit:
#   "token_million" — LLM, CNY per million tokens. Flat: input/output/cache_hit.
#                     Tiered: tiers=[{max_input, input, output, cache_hit}, ...].
#   "char"          — TTS, CNY per character (price).
#   "audio_second"  — STT, CNY per second of audio (price).
#   "audio_hour"    — STT, CNY per hour of audio (price).
#   "free"          — no charge.
#
# Prices are point-in-time; re-check vendor pricing pages / pull from Aliyun's
# model-intro API (see data/update_models.py, planned) before trusting for billing.
# `# TODO(fill)` marks data I could not confirm — please verify and fill in.

[defaults]
# Fallback context window when a (provider, model) is not listed below.
context_limit = 131072

# ── DeepSeek (direct channel) ─────────────────────────────────────────────────

[model.deepseek."deepseek-v4-flash"]
kind = "llm"
context_limit = 1_000_000
features = ["cache", "thinking"]
input_modalities = ["text"]
output_modalities = ["text"]
pricing = { unit = "token_million", input = 1.0, output = 2.0, cache_hit = 0.02 }

[model.deepseek."deepseek-v4-pro"]
kind = "llm"
context_limit = 1_000_000
features = ["cache", "thinking"]
input_modalities = ["text"]
output_modalities = ["text"]
pricing = { unit = "token_million", input = 3.0, output = 6.0, cache_hit = 0.025 }

